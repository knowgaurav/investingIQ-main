[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests
    integration: Integration tests
addopts = -v --tb=short

[coverage:run]
source = shared,activity_fetch_data,activity_cache_data,activity_llm_analysis,activity_ml_analysis,activity_aggregate
omit = 
    */tests/*
    */__pycache__/*
    */.venv/*
    shared/llm_analysis_service.py
    shared/llm_providers.py
    shared/llm_providers_v2.py
    shared/llm_provider_factory_v2.py
    shared/llm_tools.py
    shared/llm_utils.py
    shared/webpubsub_utils.py
    shared/db_utils.py
    shared/embedding_utils.py
    shared/scraper_utils.py

[coverage:report]
fail_under = 80
show_missing = true
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
